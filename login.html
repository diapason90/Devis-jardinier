<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion – ChrisGarden Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/style.css">
  <script src="assets/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase.js"></script>
  <script src="assets/auth.js"></script>
  <script>
    if (isAuthenticated()) window.location.href = 'index.html';
  </script>
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="icon-plant">🌿</span>
      <h1>ChrisGarden<span class="pro-badge">Pro</span></h1>
    </div>
    <p class="auth-subtitle">Connectez-vous pour accéder à votre espace</p>

    <form class="auth-form" onsubmit="handleLogin(event)" autocomplete="on">

      <div class="form-group">
        <label for="loginInput"><i class="fas fa-envelope"></i> Email</label>
        <input
          type="email"
          id="loginInput"
          placeholder="vous@exemple.com"
          autocomplete="email"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="passwordInput"><i class="fas fa-lock"></i> Mot de passe</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="passwordInput"
            placeholder="Votre mot de passe"
            autocomplete="current-password"
            required
          >
          <button type="button" class="btn-eye" onclick="togglePassword()" tabindex="-1" title="Afficher/masquer">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div id="loginError" class="auth-error" style="display:none;">
        <i class="fas fa-exclamation-circle"></i>
        <span id="loginErrorMsg">Email ou mot de passe incorrect.</span>
      </div>

      <button type="submit" class="btn-primary btn-full" id="btnLogin">
        <i class="fas fa-sign-in-alt"></i> <span>Se connecter</span>
      </button>

    </form>

    <p class="auth-hint">
      <i class="fas fa-shield-halved"></i>
      Compte sécurisé via Supabase Auth (mots de passe chiffrés).
    </p>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('loginInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const errEl    = document.getElementById('loginError');
      const errMsg   = document.getElementById('loginErrorMsg');
      const btn      = document.getElementById('btnLogin');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Connexion...</span>';

      const { ok, error } = await doLogin(email, password);

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> <span>Se connecter</span>';

      if (ok) {
        window.location.href = 'index.html';
      } else {
        errMsg.textContent = error || 'Email ou mot de passe incorrect.';
        errEl.style.display = 'flex';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
        setTimeout(() => { errEl.style.display = 'none'; }, 5000);
      }
    }

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
